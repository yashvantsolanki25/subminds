version: '3.8'

services:
  subminds:
    build: .
    container_name: subminds-app
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config:/app/config
    environment:
      - IBM_CLOUD_API_KEY=${IBM_CLOUD_API_KEY}
      - IBM_PROJECT_ID=${IBM_PROJECT_ID}
      - POSTGRES_HOST=${POSTGRES_HOST:-postgres}
      - POSTGRES_USER=${POSTGRES_USER:-subminds}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - MONGO_HOST=${MONGO_HOST:-mongodb}
      - MONGO_USER=${MONGO_USER:-subminds}
      - MONGO_PASSWORD=${MONGO_PASSWORD}
    devices:
      - /dev/video0:/dev/video0  # Webcam access
    networks:
      - subminds-network
    depends_on:
      - postgres
      - mongodb
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: subminds-postgres
    environment:
      - POSTGRES_DB=subminds
      - POSTGRES_USER=${POSTGRES_USER:-subminds}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - subminds-network
    restart: unless-stopped

  mongodb:
    image: mongo:6
    container_name: subminds-mongodb
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER:-subminds}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD}
      - MONGO_INITDB_DATABASE=subminds
    volumes:
      - mongodb-data:/data/db
    networks:
      - subminds-network
    restart: unless-stopped

volumes:
  postgres-data:
  mongodb-data:

networks:
  subminds-network:
    driver: bridge


name: Release - Create Release and Deploy

on:
  push:
    tags:
      - 'v*.*.*'  # Triggers on version tags like v1.0.0, v1.2.3, etc.

permissions:
  contents: write
  packages: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine

    - name: Get version from tag
      id: get_version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

    - name: Generate changelog
      id: changelog
      run: |
        echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
        git log $(git describe --tags --abbrev=0 HEAD^)..HEAD --pretty=format:"- %s (%h)" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Build Python package
      run: |
        python -m build

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        name: SubMinds v${{ steps.get_version.outputs.VERSION }}
        body: |
          ## 🎉 SubMinds Release v${{ steps.get_version.outputs.VERSION }}
          
          ### What's New
          ${{ steps.changelog.outputs.CHANGELOG }}
          
          ### 📦 Installation
          
          ```bash
          pip install subminds==${{ steps.get_version.outputs.VERSION }}
          ```
          
          Or download the source code and install:
          
          ```bash
          pip install -r requirements.txt
          python setup.py install
          ```
          
          ### 🚀 Quick Start
          
          ```bash
          # Set up environment
          cp .env.example .env
          # Add your IBM Granite credentials
          
          # Run simulation
          python scripts/run_simulation.py
          ```
          
          ### 📚 Documentation
          - [README](https://github.com/${{ github.repository }}/blob/v${{ steps.get_version.outputs.VERSION }}/README.md)
          - [Installation Guide](https://github.com/${{ github.repository }}/blob/v${{ steps.get_version.outputs.VERSION }}/docs/INSTALLATION.md)
          - [IBM Granite Setup](https://github.com/${{ github.repository }}/blob/v${{ steps.get_version.outputs.VERSION }}/docs/IBM_GRANITE_SETUP.md)
          - [Quick Start](https://github.com/${{ github.repository }}/blob/v${{ steps.get_version.outputs.VERSION }}/QUICKSTART.md)
          
          ### 🐳 Docker
          
          ```bash
          docker pull ghcr.io/${{ github.repository }}:v${{ steps.get_version.outputs.VERSION }}
          ```
          
          ### 🔗 Links
          - [Full Changelog](https://github.com/${{ github.repository }}/compare/v${{ steps.get_version.outputs.VERSION }}...HEAD)
          - [Issues](https://github.com/${{ github.repository }}/issues)
          - [Discussions](https://github.com/${{ github.repository }}/discussions)
        files: |
          dist/*
        draft: false
        prerelease: false
        generate_release_notes: true

  build-and-push-docker:
    runs-on: ubuntu-latest
    needs: create-release
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/${{ github.repository }}
        tags: |
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}
          type=raw,value=latest

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  publish-pypi:
    runs-on: ubuntu-latest
    needs: create-release
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine

    - name: Build package
      run: python -m build

    - name: Publish to PyPI
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
      run: |
        twine upload dist/* || echo "PyPI upload skipped (configure PYPI_API_TOKEN secret to enable)"

